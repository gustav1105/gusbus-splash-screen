<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Bus | Portal Access</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h1 { margin-bottom: 0.5rem; color: var(--primary); }
        .subtitle { font-size: 0.9rem; color: #64748b; margin-bottom: 2rem; }
        .welcome-box { background: #f1f5f9; padding: 1.5rem; border-radius: 0.75rem; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            margin: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }
        .footer-links { margin-top: 2rem; font-size: 0.85rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Public Bus</h1>
    <p class="subtitle">Portal Access Gateway</p>

    <div class="welcome-box">
        <h3>Visitors, Welcome!</h3>
        <p>Follow the link below to guide you to the trusted federated login.</p>
        <small><em>(The app does not save or share your information.)</em></small>
    </div>
    <a href="https://client.gusbus.co.za" class="btn">Secure Access</a>
</div>

</body>
</html>
